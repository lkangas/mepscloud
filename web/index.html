<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MEPS cloud forecast — Finland</title>
<style>
  :root { --bg:#0d1117; --panel:#161b22; --fg:#e6edf3; --muted:#9aa7b4; --accent:#e23b3b; --line:#30363d; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg);
         font:14px/1.45 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  main { padding:8px; }
  .map { width:640px; max-width:96vw; }
  .frame { position:relative; width:100%; border-radius:6px; overflow:hidden; background:#000; }
  .frame img { position:absolute; inset:0; width:100%; height:100%; display:block; }
  .frame .spacer { width:100%; aspect-ratio: 949 / 1069; }
  #sea-layer, #land-layer { position:absolute; inset:0; }
  /* land colour painted only where landmask.png is opaque; sea shows through
     (incl. lakes, which are transparent in the mask) from #sea-layer behind */
  #land-layer {
    -webkit-mask-image: url(static/landmask.png); mask-image: url(static/landmask.png);
    -webkit-mask-size: 100% 100%; mask-size: 100% 100%;
    -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
  }
  .controls { display:flex; align-items:center; gap:8px; margin-top:8px; flex-wrap:wrap; }
  .controls button { background:#21262d; color:var(--fg); border:1px solid var(--line);
                     border-radius:6px; padding:6px 10px; cursor:pointer; font-size:14px; }
  .controls button:hover { background:#2d333b; }
  /* flex-wrap so the full layer-button row wraps to a second line on narrow
     (mobile) screens instead of being clipped to the map width by overflow */
  .seg { display:flex; flex-wrap:wrap; border:1px solid var(--line); border-radius:6px; overflow:hidden; }
  .seg button { background:#21262d; color:var(--fg); border:none; border-left:1px solid var(--line);
                border-radius:0; padding:6px 10px; cursor:pointer; font-size:13px; }
  .seg button:first-child { border-left:none; }
  .seg button:hover { background:#2d333b; }
  .seg button.active { background:var(--accent); color:#fff; }
  select { background:#21262d; color:var(--fg); border:1px solid var(--line); border-radius:6px;
           padding:6px 8px; font-size:13px; }
  input[type=range] { flex:1; min-width:200px; accent-color:var(--accent); }
  .timelabel { font-variant-numeric:tabular-nums; min-width:160px; text-align:right; color:var(--muted); }
  .err { color:#ff7b72; font-size:12px; margin-top:8px; }
  label { font-size:12px; color:var(--muted); }
  /* fetch/process status grid */
  .status { margin-top:12px; font-size:11px; }
  .status-run { margin-bottom:10px; }
  .status-hdr { color:var(--fg); font-variant-numeric:tabular-nums; margin-bottom:4px; }
  .status-grid { display:flex; flex-direction:column; gap:2px; }
  .status-row { display:flex; align-items:center; gap:6px; }
  .status-lbl { flex:none; width:34px; text-align:right; color:var(--muted); font-size:10px; }
  .status-boxes { display:flex; gap:1px; }
  .status-boxes .box { width:6px; height:11px; border-radius:1px; background:#30363d;
                       transition:background .2s; }
  .box.s1 { background:#d0a030; }   /* fetched */
  .box.s2 { background:#3fb950; }   /* processed / ready */
  .status-log { margin-top:6px; color:var(--muted); font-size:10px;
                font-variant-numeric:tabular-nums; line-height:1.5; cursor:pointer; }
  .status-log:hover { color:var(--fg); text-decoration:underline; }
  .modal { position:fixed; inset:0; background:rgba(0,0,0,.6); display:flex;
           align-items:center; justify-content:center; z-index:100; }
  .modal[hidden] { display:none; }
  .modal-box { background:var(--panel); border:1px solid var(--line); border-radius:8px;
               max-width:min(720px,92vw); max-height:80vh; display:flex; flex-direction:column; }
  .modal-hdr { display:flex; justify-content:space-between; align-items:center;
               padding:8px 12px; border-bottom:1px solid var(--line); font-size:13px; }
  .modal-hdr button { background:none; border:none; color:var(--fg); cursor:pointer; font-size:15px; }
  .modal-box pre { margin:0; padding:12px; overflow:auto; font-size:11px; line-height:1.5;
                   color:var(--fg); white-space:pre; }
  .menu { position:relative; }
  .menu > summary { list-style:none; cursor:pointer; background:#21262d; color:var(--fg);
    border:1px solid var(--line); border-radius:6px; padding:6px 10px; font-size:13px; user-select:none; }
  .menu > summary::-webkit-details-marker { display:none; }
  .menu[open] > summary { background:#2d333b; }
  /* opens upward (over the map) so it never pushes the page past the viewport */
  .menu-body { position:absolute; z-index:20; bottom:100%; left:0; margin-bottom:4px;
    background:var(--panel); border:1px solid var(--line); border-radius:6px; padding:8px 10px;
    display:flex; flex-direction:column; gap:8px; white-space:nowrap; }
  .menu-body label { display:flex; align-items:center; gap:6px; }
  /* precipitation legend (three phase ramps), shown while precip is toggled on */
  .precip-legend { margin-top:8px; display:flex; flex-direction:column; gap:3px;
                   font-size:10px; color:var(--muted); }
  .precip-legend[hidden] { display:none; }
  .pl-row { display:flex; align-items:center; gap:6px; }
  .pl-lbl { width:34px; text-align:right; }
  .pl-bar { height:9px; width:150px; max-width:40vw; border-radius:2px; border:1px solid var(--line); }
  .pl-rain { background:linear-gradient(to right,#0189cc,#00868e,#21b876,#69dc67,#d8f31c,
             #faf505,#fdbd11,#fe7320,#ff5328,#c1220f,#de0d00,#fc1b4b,#f840ff,#fba8ff,#fef9ff); }
  .pl-frz  { background:linear-gradient(to right,#dc88d2,#9f78ac,#914e97,#87338a,#7e1a7e,#750071); }
  .pl-snow { background:linear-gradient(to right,#19d0db,#00a8c5,#0093ba,#0080b0,#0065a7,
             #0054a1,#001789,#010071); }
  /* --- meteogram: map + panel side by side (desktop), stacked (mobile) --- */
  .layout { display:flex; gap:14px; flex-wrap:wrap; align-items:flex-start; }
  .meteo { width:380px; max-width:96vw; }
  .meteo-hdr { display:flex; align-items:center; gap:8px; flex-wrap:wrap;
               font-size:12px; color:var(--muted); margin-bottom:6px; }
  .meteo-hdr .pt { color:var(--fg); font-variant-numeric:tabular-nums; }
  .meteo-hdr button { background:#21262d; color:var(--fg); border:1px solid var(--line);
                      border-radius:6px; padding:3px 8px; cursor:pointer; font-size:13px; }
  .meteo-hdr button:hover { background:#2d333b; }
  #chart { width:100%; height:auto; display:block; background:#0b0f14;
           border:1px solid var(--line); border-radius:6px; }
  .meteo-legend { display:flex; gap:12px; flex-wrap:wrap; font-size:11px; margin-top:6px; }
  .meteo-legend span { display:inline-flex; align-items:center; gap:5px; color:var(--muted); }
  .meteo-legend i { width:16px; height:3px; border-radius:2px; display:inline-block; }
  .meteo-note { font-size:11px; color:var(--muted); margin-top:6px; }
  /* stage wraps every map layer + the marker so the zoom transform (clipped by
     .frame's overflow:hidden) scales them together */
  #stage { position:absolute; inset:0; transform-origin:center center;
           transition:transform .18s ease; }
  #marker { position:absolute; width:18px; height:18px; margin:-9px 0 0 -9px;
            border:2px solid #fff; border-radius:50%; background:rgba(255,255,255,.12);
            box-shadow:0 0 0 1.5px #000, 0 0 4px #000; cursor:grab; z-index:30; display:none;
            touch-action:none; }
  #marker::after { content:''; position:absolute; inset:5px; border-radius:50%;
                   background:#fff; box-shadow:0 0 0 1px #000; }
  #stage.dragging { cursor:grabbing; }
  #stage.dragging #marker { cursor:grabbing; }
  .controls button.active { background:var(--accent); color:#fff; border-color:var(--accent); }
</style>
</head>
<body>
<main>
  <div class="layout">
  <section class="map">
    <div class="frame" id="frame">
      <div class="spacer"></div>
      <div id="stage">
        <div id="sea-layer"></div>
        <div id="land-layer"></div>
        <img id="base" alt="cloud layer frame">
        <img id="precip" alt="precipitation" style="display:none">
        <svg id="twilight-shade" preserveAspectRatio="none" style="position:absolute; inset:0; width:100%; height:100%;"></svg>
        <svg id="twilight-lines" preserveAspectRatio="none" style="position:absolute; inset:0; width:100%; height:100%;"></svg>
        <img id="roads" src="static/roads.png" alt="Finnish roads">
        <img id="overlay" src="static/overlay.png" alt="coastlines/borders">
        <div id="marker" title="Drag, or click the map, to move the meteogram point"></div>
      </div>
    </div>
    <div class="controls">
      <div id="layerButtons" class="seg"></div>
      <details class="menu">
        <summary>Overlays ▾</summary>
        <div class="menu-body">
          <label id="precipToggle"><input type="checkbox" id="showPrecip"> precipitation</label>
          <label><input type="checkbox" id="showRoads" checked> roads</label>
          <label><input type="checkbox" id="showOverlay" checked> coastlines</label>
          <label><input type="checkbox" id="showTwilightShade" checked> sun shade</label>
          <label><input type="checkbox" id="showTwilightLines" checked> sun lines</label>
        </div>
      </details>
      <button id="preload" title="Preload every frame for smooth scrubbing/animation">⤓ Preload</button>
      <button id="zoom" title="Zoom the map in around the marker">⤢ Zoom</button>
    </div>
    <div id="precipLegend" class="precip-legend" hidden>
      <div class="pl-row"><span class="pl-lbl">Rain</span><span class="pl-bar pl-rain"></span><span>0–25 mm/h</span></div>
      <div class="pl-row"><span class="pl-lbl">Frz</span><span class="pl-bar pl-frz"></span><span>0–5 mm/h</span></div>
      <div class="pl-row"><span class="pl-lbl">Snow</span><span class="pl-bar pl-snow"></span><span>0–15 cm/h</span></div>
    </div>
    <div class="controls">
      <button id="play" title="Play/pause">▶</button>
      <button id="prev" title="Previous (←)">⟨</button>
      <button id="next" title="Next (→)">⟩</button>
      <input id="slider" type="range" min="0" max="0" value="0">
      <span class="timelabel" id="time">—</span>
    </div>
    <div id="status" class="status"></div>
    <div class="err" id="err"></div>
  </section>
  <section class="meteo" id="meteo">
    <div class="meteo-hdr">
      <span>Point: <span class="pt" id="ptLatLon">—</span></span>
      <button id="geoloc" title="Use my location">📍 my location</button>
    </div>
    <svg id="chart" viewBox="0 0 380 220" preserveAspectRatio="xMidYMid meet"></svg>
    <div class="meteo-legend" id="meteoLegend"></div>
    <div class="meteo-note">Cloud cover (%) at the marker vs forecast time. Drag the marker or click the map to move it.</div>
  </section>
  </div>
</main>

<div id="logModal" class="modal" hidden>
  <div class="modal-box">
    <div class="modal-hdr"><span>Processing log</span><button id="logClose" title="Close">✕</button></div>
    <pre id="logPre"></pre>
  </div>
</div>

<script src="static/twilight.js"></script>
<script>
const $ = id => document.getElementById(id);
const base = $('base'), overlay = $('overlay'), slider = $('slider'), timeEl = $('time');
const precip = $('precip');  // precipitation overlay, above clouds / below twilight
const layerButtons = $('layerButtons');
const twilightShadeSvg = $('twilight-shade');  // above clouds, below overlay
const twilightLinesSvg = $('twilight-lines');  // above shade, below overlay
let manifest = null, idx = 0, playing = false, timer = null, currentLayer = null;

// Locked underlay colours (from the earlier slider tuning: sea 7/11, land
// 10/16). Sliders removed; sea fills the whole frame behind the land mask.
const SEA_COLOR = '#245f92';
const LAND_COLOR = '#5f7338';
$('sea-layer').style.backgroundColor = SEA_COLOR;
$('land-layer').style.backgroundColor = LAND_COLOR;

// fillAlpha values are a first guess, meant to be tuned visually: each
// depression level's "beyond this point" disk is stacked as its own layer
// (single stack, above both basemap and clouds, below the coastline
// overlay -- see index.html DOM order), so darkness accumulates toward
// the deepest band. Same black colour for every layer relies on basemap
// starting dark (crushes toward black fast) vs. cloud starting white
// (has much more headroom) to get "dims basemap a lot, cloud a little"
// out of ONE shared stack, rather than needing separate above/below-cloud
// layers at different alphas.
const TWILIGHT_BANDS = [
  { depression: 0, fillAlpha: 0.16 },
  { depression: 6, fillAlpha: 0.12 },
  { depression: 12, fillAlpha: 0.12 },
  { depression: 18, fillAlpha: 0.14 },
];
const TWILIGHT_FILL_COLOR = '#000000';
const TWILIGHT_LINE_COLOR = '#333333';  // dark grey, all solid, 1.5px

function initTwilightSvg(grid) {
  // shade fills go in the below-clouds SVG; line contours in the on-top SVG
  twilightShadeSvg.setAttribute('viewBox', `0 0 ${grid.nx} ${grid.ny}`);
  twilightLinesSvg.setAttribute('viewBox', `0 0 ${grid.nx} ${grid.ny}`);
  twilightShadeSvg.innerHTML = '';
  twilightLinesSvg.innerHTML = '';
  for (const band of TWILIGHT_BANDS) {
    const fill = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    fill.setAttribute('id', 'twi-fill-' + band.depression);
    fill.setAttribute('fill', TWILIGHT_FILL_COLOR);
    fill.setAttribute('fill-rule', 'evenodd');
    fill.setAttribute('fill-opacity', String(band.fillAlpha));
    fill.setAttribute('stroke', 'none');
    twilightShadeSvg.appendChild(fill);
  }
  for (const band of TWILIGHT_BANDS) {
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    line.setAttribute('id', 'twi-line-' + band.depression);
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke', TWILIGHT_LINE_COLOR);
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('opacity', '0.85');
    line.setAttribute('vector-effect', 'non-scaling-stroke');
    twilightLinesSvg.appendChild(line);
  }
}

function segmentsToPathD(segments) {
  return segments.map(seg => 'M' + seg.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join('L')).join(' ');
}

function rectPathD(nx, ny) {
  return `M0,0L${nx},0L${nx},${ny}L0,${ny}Z`;
}

function loopToPathD(loopPts) {
  return 'M' + loopPts.map(([x, y]) => `${x.toFixed(1)},${y.toFixed(1)}`).join('L') + 'Z';
}

function updateTwilight(validTimeIso) {
  const when = new Date(validTimeIso + 'Z');
  const grid = manifest.grid;
  const rectD = rectPathD(grid.nx, grid.ny);
  for (const band of TWILIGHT_BANDS) {
    const loop = twilightFillLoop(when, band.depression, grid);
    $('twi-fill-' + band.depression).setAttribute('d', rectD + ' ' + loopToPathD(loop));
    const segments = twilightContourSegments(when, band.depression, grid);
    $('twi-line-' + band.depression).setAttribute('d', segmentsToPathD(segments));
  }
}

const LAYER_LABEL = {
  combined: 'Custom (altitude-coloured)',
  cloud_area_fraction: 'Total cloud',
  low_type_cloud_area_fraction: 'Low cloud',
  medium_type_cloud_area_fraction: 'Mid cloud',
  high_type_cloud_area_fraction: 'High cloud',
  fog_area_fraction: 'Fog',
  convective_cloud_area_fraction: 'Convective cloud',
  cloud_binary_mask: 'Cloud binary mask',
  cloud_base_altitude: 'Cloud base altitude',
  cloud_top_altitude: 'Cloud top altitude',
  precip: 'Precipitation (rate + phase)',
};
const LAYER_SHORT = {
  combined: 'Custom',
  cloud_area_fraction: 'T',
  low_type_cloud_area_fraction: 'L',
  medium_type_cloud_area_fraction: 'M',
  high_type_cloud_area_fraction: 'H',
  fog_area_fraction: 'Fog',
  convective_cloud_area_fraction: 'Conv',
  cloud_binary_mask: 'Mask',
  cloud_base_altitude: 'Base',
  cloud_top_altitude: 'Top',
  precip: 'Precip',
};

function frameUrl(layer, step) {
  return 'cache/' + manifest.frame_url_template
    .replace('{layer}', layer)
    .replace('{step:03d}', String(step).padStart(3, '0'));
}

// Shared decoded-frame cache (url -> Promise<HTMLImageElement>). Used by both
// the Preload button and the meteogram's pixel sampling, so neither reloads a
// frame the other already has. Cleared on run handover (resetPreload).
const frameCache = new Map();
function loadFrame(url) {
  let p = frameCache.get(url);
  if (!p) {
    p = new Promise((res, rej) => {
      const img = new Image();
      img.onload = () => res(img);
      img.onerror = () => rej(new Error('load failed: ' + url));
      img.src = url;
    });
    frameCache.set(url, p);
  }
  return p;
}
function resetPreload() {
  frameCache.clear();
  const btn = $('preload');
  btn.disabled = false;
  btn.textContent = '⤓ Preload';
}
function preloadAllFrames() {
  if (!manifest) return;
  const btn = $('preload');
  const n = manifest.valid_times_utc.length;
  const urls = [];
  for (const layer of manifest.layers)
    for (let i = 0; i < n; i++) urls.push(frameUrl(layer, i));
  if (manifest.precip_layer)
    for (let i = 0; i < n; i++) urls.push(frameUrl(manifest.precip_layer, i));
  let done = 0;
  btn.disabled = true;
  const tick = () => {
    done++;
    if (done >= urls.length) { btn.textContent = 'Preloaded ✓'; btn.disabled = false; }
    else btn.textContent = 'Preloading ' + Math.floor(done / urls.length * 100) + '%';
  };
  for (const url of urls) loadFrame(url).then(tick, tick);
}

// ===== Meteogram: point time series via client-side pixel-readback =========
// The raw cloud-fraction frames are LA PNGs (alpha = fraction). Project the
// marker's lat/lon -> frame pixel (twilight.js), then read that pixel's alpha
// across all frames of each layer. No backend involved.
const stage = $('stage'), marker = $('marker'), chart = $('chart');
const METEO_SERIES = [
  { key: 'cloud_area_fraction',             label: 'Total', color: '#cbd5e1' },
  { key: 'low_type_cloud_area_fraction',    label: 'Low',   color: '#ff9a2e' },
  { key: 'medium_type_cloud_area_fraction', label: 'Mid',   color: '#ffe14d' },
  { key: 'high_type_cloud_area_fraction',   label: 'High',  color: '#6cb6ff' },
];
const KOMAKALLIO = [60.2415, 24.3349];   // default point / geoloc fallback
const ZOOM_K = 3;
let markerPx = null, markerPy = null, zoomOn = false, lastSeries = null;

function insideGrid(px, py) {
  const g = manifest.grid;
  return px >= 0 && px <= g.nx && py >= 0 && py <= g.ny;
}
function stageEventToPixel(e) {   // rect reflects any zoom transform, so this maps in both states
  const r = stage.getBoundingClientRect(), g = manifest.grid;
  return [(e.clientX - r.left) / r.width * g.nx, (e.clientY - r.top) / r.height * g.ny];
}
function placeMarkerPixel(px, py, resample = true) {
  const g = manifest.grid;
  markerPx = Math.max(0, Math.min(g.nx, px));
  markerPy = Math.max(0, Math.min(g.ny, py));
  marker.style.left = (markerPx / g.nx * 100) + '%';
  marker.style.top = (markerPy / g.ny * 100) + '%';
  marker.style.display = 'block';
  const [lat, lon] = pixelToLatLon(markerPx, markerPy, g);
  $('ptLatLon').textContent = lat.toFixed(3) + '°N, ' + lon.toFixed(3) + '°E';
  if (resample) scheduleSample();
}
function placeMarkerLatLon(lat, lon) { placeMarkerPixel(...latLonToPixel(lat, lon, manifest.grid)); }

// pointer interaction: drag the marker handle; click/tap the map to place it
let dragging = false, justDragged = false;
marker.addEventListener('pointerdown', e => {
  if (!manifest) return;
  dragging = true; stage.classList.add('dragging');
  marker.setPointerCapture(e.pointerId);
  e.preventDefault(); e.stopPropagation();
});
marker.addEventListener('pointermove', e => { if (dragging) placeMarkerPixel(...stageEventToPixel(e)); });
marker.addEventListener('pointerup', e => {
  if (!dragging) return;
  dragging = false; stage.classList.remove('dragging');
  try { marker.releasePointerCapture(e.pointerId); } catch (_) {}
  justDragged = true; setTimeout(() => { justDragged = false; }, 50);
  scheduleSample();
});
stage.addEventListener('click', e => {
  if (justDragged || !manifest) return;
  placeMarkerPixel(...stageEventToPixel(e));
});

// sampling (coalesced: at most one pass in flight; re-runs if the marker moved)
const _mctx = (() => { const c = document.createElement('canvas'); c.width = c.height = 1; return c.getContext('2d', { willReadFrequently: true }); })();
let sampling = false, pendingSample = false;
function scheduleSample() {
  if (markerPx == null || !manifest) return;
  if (sampling) { pendingSample = true; return; }
  doSample();
}
async function doSample() {
  sampling = true; pendingSample = false;
  if (!lastSeries) chart.innerHTML = '<text x="12" y="20" fill="#9aa7b4" font-size="11">sampling…</text>';
  const g = manifest.grid, n = manifest.valid_times_utc.length;
  const col = Math.max(0, Math.min(g.nx - 1, Math.round(markerPx)));
  const row = Math.max(0, Math.min(g.ny - 1, Math.round(markerPy)));
  const series = {};
  try {
    for (const s of METEO_SERIES) {   // load each layer's frames in parallel, then read the pixel
      const imgs = await Promise.all(Array.from({ length: n }, (_, i) => loadFrame(frameUrl(s.key, i)).catch(() => null)));
      const arr = series[s.key] = new Array(n).fill(null);
      for (let i = 0; i < n; i++) {
        if (!imgs[i]) continue;
        _mctx.clearRect(0, 0, 1, 1);
        _mctx.drawImage(imgs[i], col, row, 1, 1, 0, 0, 1, 1);
        arr[i] = _mctx.getImageData(0, 0, 1, 1).data[3] / 255;
      }
    }
  } catch (_) { sampling = false; return; }
  sampling = false;
  lastSeries = series;
  drawChart(series);
  if (pendingSample) doSample();   // marker moved while sampling -> resample at the latest spot
}

const CH = { W: 380, H: 220, padL: 30, padR: 8, padT: 8, padB: 22 };
function chX(i, n) { return CH.padL + (n <= 1 ? 0 : i / (n - 1)) * (CH.W - CH.padL - CH.padR); }
function chY(f) { return (CH.H - CH.padB) - f * (CH.H - CH.padB - CH.padT); }
function localHM(iso) {
  return new Intl.DateTimeFormat('en-GB', { timeZone: 'Europe/Helsinki', hourCycle: 'h23',
    day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' })
    .formatToParts(new Date(iso + 'Z')).reduce((o, x) => (o[x.type] = x.value, o), {});
}
function drawChart(series) {
  const n = manifest.valid_times_utc.length;
  let s = '';
  for (let p = 0; p <= 100; p += 25) {   // y grid + % labels
    const y = chY(p / 100);
    s += `<line x1="${CH.padL}" y1="${y.toFixed(1)}" x2="${CH.W - CH.padR}" y2="${y.toFixed(1)}" stroke="#1e2933" stroke-width="1"/>`;
    s += `<text x="${CH.padL - 4}" y="${(y + 3).toFixed(1)}" fill="#6b7681" font-size="9" text-anchor="end">${p}</text>`;
  }
  for (let i = 0; i < n; i++) {   // x ticks at local midnights (date) + noons (12)
    const t = localHM(manifest.valid_times_utc[i]);
    if (t.minute !== '00') continue;
    const lbl = t.hour === '00' ? `${t.day}.${t.month}` : (t.hour === '12' ? '12' : null);
    if (!lbl) continue;
    const x = chX(i, n);
    s += `<line x1="${x.toFixed(1)}" y1="${CH.padT}" x2="${x.toFixed(1)}" y2="${CH.H - CH.padB}" stroke="#161f28" stroke-width="1"/>`;
    s += `<text x="${x.toFixed(1)}" y="${CH.H - 8}" fill="#6b7681" font-size="9" text-anchor="middle">${lbl}</text>`;
  }
  for (const ser of METEO_SERIES) {
    const pts = series[ser.key].map((f, i) => f == null ? null : `${chX(i, n).toFixed(1)},${chY(f).toFixed(1)}`).filter(Boolean).join(' ');
    s += `<polyline points="${pts}" fill="none" stroke="${ser.color}" stroke-width="1.6" stroke-linejoin="round"/>`;
  }
  s += `<line id="chartCursor" x1="0" y1="${CH.padT}" x2="0" y2="${CH.H - CH.padB}" stroke="var(--accent)" stroke-width="1" opacity="0.9"/>`;
  chart.innerHTML = s;
  updateChartCursor(idx);
}
function updateChartCursor(i) {
  const cur = document.getElementById('chartCursor');
  if (!cur || !manifest) return;
  const x = chX(i, manifest.valid_times_utc.length).toFixed(1);
  cur.setAttribute('x1', x); cur.setAttribute('x2', x);
}
function buildMeteoLegend() {
  $('meteoLegend').innerHTML = METEO_SERIES.map(s => `<span><i style="background:${s.color}"></i>${s.label}</span>`).join('');
}

// zoom: crop/enlarge the map around the marker, entirely client-side (CSS transform)
function applyZoom() {
  if (zoomOn && markerPx != null) {
    const g = manifest.grid;
    stage.style.transformOrigin = `${(markerPx / g.nx * 100).toFixed(2)}% ${(markerPy / g.ny * 100).toFixed(2)}%`;
    stage.style.transform = `scale(${ZOOM_K})`;
    marker.style.transform = `scale(${1 / ZOOM_K})`;   // keep the marker screen-size constant
  } else {
    stage.style.transform = '';
    marker.style.transform = '';
  }
}
$('zoom').onclick = () => { zoomOn = !zoomOn; $('zoom').classList.toggle('active', zoomOn); applyZoom(); };

// geolocation: auto on first load (silent), or via the button
function tryGeolocate(auto) {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const [px, py] = latLonToPixel(pos.coords.latitude, pos.coords.longitude, manifest.grid);
    if (insideGrid(px, py)) placeMarkerPixel(px, py);
    else if (!auto) document.querySelector('.meteo-note').textContent = 'Your location is outside the forecast area.';
  }, () => { if (!auto) document.querySelector('.meteo-note').textContent = 'Location unavailable (permission denied?).'; },
    { timeout: 8000, maximumAge: 600000 });
}
$('geoloc').onclick = () => tryGeolocate(false);
function initMeteoMarker() {
  buildMeteoLegend();
  placeMarkerLatLon(KOMAKALLIO[0], KOMAKALLIO[1]);   // immediate default (samples)
  tryGeolocate(true);                                 // async: move if permitted & in-domain
}

// ISO-format the UTC valid time in Finnish local time, tagged EET/EEST.
// Finland is UTC+2 (EET) in winter, UTC+3 (EEST) in summer DST; derive the
// tag from the actual offset for the given date rather than assuming.
function fmtHelsinki(validIso) {
  const utcDate = new Date(validIso + 'Z');
  const p = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Europe/Helsinki', hourCycle: 'h23',
    year: 'numeric', month: '2-digit', day: '2-digit',
    hour: '2-digit', minute: '2-digit',
  }).formatToParts(utcDate).reduce((o, x) => (o[x.type] = x.value, o), {});
  const asUTC = Date.UTC(+p.year, +p.month - 1, +p.day, +p.hour, +p.minute);
  const offH = Math.round((asUTC - utcDate.getTime()) / 3600000);
  const tag = offH === 3 ? 'EEST' : 'EET';
  return `${p.year}-${p.month}-${p.day} ${p.hour}:${p.minute} ${tag}`;
}

function show(i) {
  if (!manifest) return;
  const n = manifest.valid_times_utc.length;
  idx = (i + n) % n;
  base.src = frameUrl(currentLayer, idx);
  if (manifest.precip_layer) precip.src = frameUrl(manifest.precip_layer, idx);
  slider.value = idx;
  const validIso = manifest.valid_times_utc[idx];
  timeEl.textContent = fmtHelsinki(validIso);
  updateTwilight(validIso);
  updateChartCursor(idx);
}
function step(d) { show(idx + d); }
function togglePlay() {
  playing = !playing;
  $('play').textContent = playing ? '⏸' : '▶';
  if (playing) timer = setInterval(() => step(1), 400);
  else clearInterval(timer);
}

slider.addEventListener('input', e => { if (playing) togglePlay(); show(+e.target.value); });
$('play').onclick = togglePlay;
$('prev').onclick = () => { if (playing) togglePlay(); step(-1); };
$('next').onclick = () => { if (playing) togglePlay(); step(1); };
$('preload').onclick = preloadAllFrames;
$('showPrecip').onchange = e => {
  const on = e.target.checked;
  precip.style.display = on ? 'block' : 'none';
  $('precipLegend').hidden = !on;
};
$('showRoads').onchange = e => { $('roads').style.display = e.target.checked ? 'block' : 'none'; };
$('showOverlay').onchange = e => { overlay.style.display = e.target.checked ? 'block' : 'none'; };
$('showTwilightShade').onchange = e => {
  const d = e.target.checked ? 'inline' : 'none';
  TWILIGHT_BANDS.forEach(b => $('twi-fill-' + b.depression).style.display = d);
};
$('showTwilightLines').onchange = e => {
  const d = e.target.checked ? 'inline' : 'none';
  TWILIGHT_BANDS.forEach(b => $('twi-line-' + b.depression).style.display = d);
};
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { if (playing) togglePlay(); step(-1); }
  if (e.key === 'ArrowRight') { if (playing) togglePlay(); step(1); }
});

// When the Custom layer is active, tint the L/M/H/Fog buttons with the
// colours those layers get in the combined render -- a live legend.
// (bg, fg) must match render.py's COMBINED_*_RGB.
const COMBINED_LEGEND = {
  low_type_cloud_area_fraction:    { bg: '#ff9a2e', fg: '#3a2600' },
  medium_type_cloud_area_fraction: { bg: '#ffe14d', fg: '#3a3200' },
  high_type_cloud_area_fraction:   { bg: '#ffffff', fg: '#222222' },
  fog_area_fraction:               { bg: '#9b6bd0', fg: '#ffffff' },
};
function updateLayerLegend() {
  const on = currentLayer === 'combined';
  const btns = [...layerButtons.children];
  for (const [layer, c] of Object.entries(COMBINED_LEGEND)) {
    const btn = btns.find(b => b.dataset.layer === layer);
    if (!btn || btn.classList.contains('active')) { if (btn) { btn.style.backgroundColor=''; btn.style.color=''; } continue; }
    btn.style.backgroundColor = on ? c.bg : '';
    btn.style.color = on ? c.fg : '';
  }
}

// --- fetch/process status grid (polls cache/status.json) ----------------
// Format a run's init time (ISO with offset) as "YYYY-MM-DD HH:MM UTC / HH:MM EEST".
function fmtInit(iso) {
  const d = new Date(iso);
  const utc = d.toISOString().slice(0, 16).replace('T', ' ');
  const p = new Intl.DateTimeFormat('en-CA', {
    timeZone: 'Europe/Helsinki', hourCycle: 'h23',
    year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit',
  }).formatToParts(d).reduce((o, x) => (o[x.type] = x.value, o), {});
  const off = Math.round((Date.UTC(+p.year, +p.month - 1, +p.day, +p.hour, +p.minute) - d.getTime()) / 3600000);
  return `${utc} UTC / ${p.hour}:${p.minute} ${off === 3 ? 'EEST' : 'EET'}`;
}
// Wall-clock time of a UTC ISO instant in Helsinki, "HH:MM:SS EEST".
function fmtClock(iso) {
  const d = new Date(iso);
  const p = new Intl.DateTimeFormat('en-GB', {
    timeZone: 'Europe/Helsinki', hourCycle: 'h23',
    hour: '2-digit', minute: '2-digit', second: '2-digit',
  }).formatToParts(d).reduce((o, x) => (o[x.type] = x.value, o), {});
  // offset for the EET/EEST tag
  const pd = new Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/Helsinki', hourCycle: 'h23',
    year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' })
    .formatToParts(d).reduce((o, x) => (o[x.type] = x.value, o), {});
  const off = Math.round((Date.UTC(+pd.year, +pd.month - 1, +pd.day, +pd.hour, +pd.minute) - d.getTime()) / 3600000);
  return `${p.hour}:${p.minute}:${p.second} ${off === 3 ? 'EEST' : 'EET'}`;
}
function renderStatus(data) {
  const el = $('status');
  el.innerHTML = '';
  for (const run of (data.runs || [])) {
    const runEl = document.createElement('div'); runEl.className = 'status-run';
    const hdr = document.createElement('div'); hdr.className = 'status-hdr';
    const done = run.products.every(p => (run.states[p] || []).every(s => s === 2));
    hdr.textContent = 'MEPS init ' + fmtInit(run.run_utc) + (done ? '  · ready' : '  · processing…');
    runEl.appendChild(hdr);
    const grid = document.createElement('div'); grid.className = 'status-grid';
    for (const prod of run.products) {
      const row = document.createElement('div'); row.className = 'status-row';
      const lbl = document.createElement('span'); lbl.className = 'status-lbl';
      lbl.textContent = LAYER_SHORT[prod] || prod;
      row.appendChild(lbl);
      const boxes = document.createElement('div'); boxes.className = 'status-boxes';
      const states = run.states[prod] || [];
      for (let i = 0; i < run.n_frames; i++) {
        const b = document.createElement('span');
        const s = states[i] || 0;
        b.className = 'box' + (s ? ' s' + s : '');
        boxes.appendChild(b);
      }
      row.appendChild(boxes); grid.appendChild(row);
    }
    runEl.appendChild(grid);
    const log = document.createElement('div'); log.className = 'status-log';
    log.title = 'click for the full processing log';
    for (const ev of (run.events || [])) {
      const line = document.createElement('div');
      line.textContent = fmtClock(ev.at) + ' · ' + ev.label;
      log.appendChild(line);
    }
    log.onclick = openLog;
    runEl.appendChild(log);
    el.appendChild(runEl);
  }
}
function openLog() {
  fetch('cache/log.txt?_=' + Date.now())
    .then(r => r.ok ? r.text() : '(no log yet)')
    .then(t => { $('logPre').textContent = t.trimEnd() || '(log is empty)'; $('logModal').hidden = false; })
    .catch(() => { $('logPre').textContent = '(log unavailable)'; $('logModal').hidden = false; });
}
$('logClose').onclick = () => { $('logModal').hidden = true; };
$('logModal').onclick = e => { if (e.target === $('logModal')) $('logModal').hidden = true; };
document.addEventListener('keydown', e => { if (e.key === 'Escape') $('logModal').hidden = true; });
function pollStatus() {
  fetch('cache/status.json?_=' + Date.now())
    .then(r => r.ok ? r.json() : null).then(d => { if (d) renderStatus(d); }).catch(() => {});
}
setInterval(pollStatus, 2000);
pollStatus();

function buildLayerButtons(layers) {
  currentLayer = layers[0];
  layerButtons.innerHTML = '';
  for (const layer of layers) {
    const btn = document.createElement('button');
    btn.textContent = LAYER_SHORT[layer] || layer;
    btn.title = LAYER_LABEL[layer] || layer;
    btn.dataset.layer = layer;
    if (layer === currentLayer) btn.classList.add('active');
    btn.onclick = () => {
      currentLayer = layer;
      [...layerButtons.children].forEach(b => b.classList.toggle('active', b === btn));
      updateLayerLegend();
      show(idx);
    };
    layerButtons.appendChild(btn);
  }
  updateLayerLegend();
}

// applyManifest (re)initialises the map for a run. Called on load and again
// when the manifest's run_utc changes (handover: the map switches to the new
// run once the pipeline finishes it and updates manifest.json).
function applyManifest(man) {
  const runChanged = manifest && man.run_utc !== manifest.run_utc;
  const firstLoad = !manifest;
  manifest = man;
  slider.max = man.valid_times_utc.length - 1;
  initTwilightSvg(man.grid);
  if (firstLoad || layerButtons.children.length === 0) buildLayerButtons(man.layers);
  // precip overlay availability: hide the toggle (and force it off) if this
  // run has no precip frames; otherwise keep the user's current on/off choice.
  const hasPrecip = !!man.precip_layer;
  $('precipToggle').style.display = hasPrecip ? 'flex' : 'none';
  if (!hasPrecip) { $('showPrecip').checked = false; precip.style.display = 'none'; $('precipLegend').hidden = true; }
  idx = Math.min(idx, man.valid_times_utc.length - 1);
  show(idx);
  if (firstLoad) initMeteoMarker();                      // place default marker + geolocate, draw chart
  if (runChanged) {
    $('err').textContent = ''; resetPreload();            // cached frames were the old run
    if (markerPx != null) scheduleSample();               // re-sample the same point from the new run
  }
}
function pollManifest() {
  fetch('cache/manifest.json?_=' + Date.now())
    .then(r => r.ok ? r.json() : null)
    .then(man => { if (man && (!manifest || man.run_utc !== manifest.run_utc)) applyManifest(man); })
    .catch(() => {});
}
setInterval(pollManifest, 5000);
fetch('cache/manifest.json').then(r => { if (!r.ok) throw new Error('no manifest'); return r.json(); })
  .then(applyManifest)
  .catch(e => { $('err').textContent = 'No data yet, or manifest fetch failed: ' + e.message; });
</script>
