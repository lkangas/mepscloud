# Updater for the MEPS cloud app. Fetches + renders the newest MEPS run on a
# poll loop (update.py), writing frames/manifest.json/status.json/log.txt into
# web/cache. The weather Caddy (in ~/weather, this repo's sibling wx repo)
# serves web/ at weather.defocus.fi/clouds/ via a read-only bind mount.
#
# Deploy target: petzval, own directory ~/clouds/repo (this repo, cloned).
# Isolated from ~/sensor-platform and ~/weather. Run from this deploy/ dir:
#   docker compose up -d --build
services:
  updater:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: mepscloud-updater
    container_name: clouds-updater
    restart: unless-stopped
    working_dir: /app
    # Run as the host user (lauri = uid 1000 on petzval) so web/cache is
    # host-owned, not root -- lets git pull / manual cleanup work.
    user: "1000:1000"
    # Bind-mount the whole repo so Caddy serves web/ (with the updater's
    # web/cache output) from the host, and code updates are a git pull away.
    volumes:
      - ..:/app
    # Bursty ~3-min render every ~3h; cap memory so a surprise can't starve
    # the sensor-platform stack sharing this box. Measured peak on petzval is
    # ~1.35 GB (the whole-variable OPeNDAP fetch spikes there); 2g gives
    # margin. TODO: chunk the fetch per timestep to drop peak below ~200 MB.
    mem_limit: 2g
    command: ["python", "update.py"]
