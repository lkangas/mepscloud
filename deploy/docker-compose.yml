# Updater for the MEPS cloud app. Fetches + renders the newest MEPS run on a
# poll loop (update.py), writing frames/manifest.json/status.json/log.txt into
# web/cache. A static web server (Caddy, nginx, ...) serves web/ separately,
# reading web/cache via a read-only bind mount. Run from this deploy/ dir:
#   docker compose up -d --build
services:
  updater:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: mepscloud-updater
    container_name: clouds-updater
    restart: unless-stopped
    working_dir: /app
    # Run as the host user (uid 1000) so web/cache is host-owned, not root --
    # lets git pull / manual cleanup work. Adjust to match your host user.
    user: "1000:1000"
    # Bind-mount the whole repo so Caddy serves web/ (with the updater's
    # web/cache output) from the host, and code updates are a git pull away.
    volumes:
      - ..:/app
    # Bursty ~3-min render every ~3h; cap memory so a surprise can't starve
    # other services on a shared host. Measured peak was ~742 MB (after
    # chunking the fetch per timestep) before w* was added; w* streams 5 more
    # surface variables the same FETCH_CHUNK-bounded way (see
    # fetch.iter_wstar_frames), so the true new peak hasn't been measured on
    # this host yet -- bumped to 1536m for headroom rather than guessing
    # exactly, re-tighten once `docker stats` shows the real number. The
    # remaining floor is the 4 combined-input arrays (low/mid/high/fog,
    # ~272 MB) kept for the derived layer.
    mem_limit: 1536m
    command: ["python", "update.py"]
